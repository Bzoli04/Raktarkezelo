<!DOCTYPE html>
<!-- Thymeleaf sablon a raktarkezelo fooldalanak megjelenitesehez. -->
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <!-- Alap karakterkodolas es a bongeszoful cime. -->
    <meta charset="UTF-8">
    <title>Raktárkezelő</title>
    <!-- Bootstrap alap stilusok es a sajat alkalmazas-stiluslap betoltese. -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<!-- A teljes fooldali tartalom kozponti kontenere. -->
<main class="app-shell">
    <!-- Fejlec: oldal cim, uj termek gomb es kijelentkezes. -->
    <header class="page-header">
        <div>
            <p class="page-kicker">Raktárkezelő</p>
            <h1>Termékek listája</h1>
        </div>
        <div class="header-actions">
            <!-- Link az uj termek felviteli urlapjara. -->
            <a th:href="@{/showNewProductForm}" class="btn btn-primary">Új termék hozzáadása</a>
            <!-- Kijelentkezes POST keressel, CSRF tokennel vedve. -->
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-secondary">Kilépés</button>
            </form>
        </div>
    </header>

    <!-- Keresosav, amely nev alapjan szuri a termeklistat. -->
    <section class="toolbar">
        <form th:action="@{/}" method="get" class="search-form">
            <input type="text" name="keyword" class="form-control" placeholder="Keresés név alapján"
                   th:value="${keyword}">
            <button type="submit" class="btn btn-outline-primary">Keresés</button>
            <!-- Csak akkor jelenik meg, ha aktiv keresoszo van. -->
            <a th:href="@{/}" class="btn btn-outline-secondary"
               th:if="${keyword != null and !keyword.isEmpty()}">Szűrés törlése</a>
        </form>
    </section>

    <!-- Termektabla: a controllerbol kapott products listat jeleniti meg. -->
    <section class="table-panel">
        <table class="table inventory-table">
            <thead>
                <!-- A tablazat oszlopainak fejlecei. -->
                <tr>
                    <th>Név</th>
                    <th>Kategória</th>
                    <th>Mennyiség</th>
                    <th>Ár</th>
                    <th>Műveletek</th>
                </tr>
            </thead>
            <tbody>
                <!-- Ures talalati uzenet, ha kereses volt, de nincs megfelelo termek. -->
                <tr th:if="${keyword != null and !keyword.isEmpty() and #lists.isEmpty(products)}">
                    <td colspan="5" class="empty-state">Nincs találat.</td>
                </tr>
                <!-- Egy sor minden termekhez; a th:text kicsereli a cellak tartalmat a termek adataira. -->
                <tr th:each="product : ${products}">
                    <td class="product-name" th:text="${product.name}"></td>
                    <td><span class="category-badge" th:text="${product.category}"></span></td>
                    <td th:text="${product.quantity}"></td>
                    <td th:text="${product.price}"></td>
                    <td>
                        <!-- Torles link az adott termek id-javal. -->
                        <a th:href="@{/deleteProduct/{id}(id=${product.id})}" class="btn btn-danger btn-sm">Törlés</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
