<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Raktárkezelő</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2>Termékek listája</h2>
    <a th:href="@{/showNewProductForm}" class="btn btn-primary mb-3">Új termék hozzáadása</a>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Név</th>
                <th>Kategória</th>
                <th>Mennyiség</th>
                <th>Ár</th>
                <th>Műveletek</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="product : ${products}">
                <td th:text="${product.name}"></td>
                <td th:text="${product.category}"></td>
                <td th:text="${product.quantity}"></td>
                <td th:text="${product.price}"></td>
                <td>
                    <a th:href="@{/deleteProduct/{id}(id=${product.id})}" class="btn btn-danger btn-sm">Törlés</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
