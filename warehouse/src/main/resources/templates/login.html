<!DOCTYPE html>
<!-- Thymeleaf sablon a sajat bejelentkezesi oldalhoz. -->
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <!-- Alap metaadatok es stiluslapok. -->
    <meta charset="UTF-8">
    <title>Bejelentkezés</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<!-- Teljes kepernyos kozepre igazitas a login panelhez. -->
<main class="login-shell">
    <!-- A bejelentkezesi kartya tartalmazza az uzeneteket es az urlapot. -->
    <section class="login-panel">
        <p class="page-kicker">Raktárkezelő</p>
        <h1>Bejelentkezés</h1>

        <!-- Sikertelen belepesnel a Spring Security error parametert ad az URL-hez. -->
        <div th:if="${param.error}" class="alert alert-danger">
            Hibás felhasználónév vagy jelszó.
        </div>
        <!-- Kijelentkezes utan logout parameter jelzi a sikeres kilepest. -->
        <div th:if="${param.logout}" class="alert alert-success">
            Sikeres kijelentkezés.
        </div>

        <!-- A Spring Security alapertelmezetten username es password mezoket var. -->
        <form th:action="@{/login}" method="post" class="login-form">
            <!-- CSRF token a bejelentkezesi POST kereshez. -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="form-group">
                <!-- Felhasznalonev mezo, automatikus fokuszszal. -->
                <label class="form-label" for="username">Felhasználónév</label>
                <input id="username" name="username" type="text" class="form-control" autocomplete="username" autofocus>
            </div>
            <div class="form-group">
                <!-- Jelszo mezo, amely a bongeszonek jelzi, hogy aktualis jelszot ker. -->
                <label class="form-label" for="password">Jelszó</label>
                <input id="password" name="password" type="password" class="form-control" autocomplete="current-password">
            </div>
            <!-- Az urlap elkuldese elinditja a Spring Security hitelesitest. -->
            <button type="submit" class="btn btn-primary w-100">Belépés</button>
        </form>

        <!-- Fejlesztoi segitseg: mutatja a memoriaban beallitott teszt felhasznalot. -->
        <p class="login-hint">Teszt felhasználó: admin / admin123</p>
    </section>
</main>
</body>
</html>
