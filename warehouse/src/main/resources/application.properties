# Az alkalmazas neve, amelyet a Spring Boot belso azonositasra is hasznal.
spring.application.name=warehouse

# H2 memoriabeli adatbazis URL-je; ujrainditas utan az adatok torlodnek.
spring.datasource.url=jdbc:h2:mem:testdb

# A H2 JDBC driver osztalya.
spring.datasource.driverClassName=org.h2.Driver

# H2 alapertelmezett felhasznalonev.
spring.datasource.username=sa

# H2 alapertelmezetten ures jelszoval fut fejlesztesi kornyezetben.
spring.datasource.password=

# Hibernate dialektus, amely megmondja, milyen SQL-t generaljon H2 adatbazishoz.
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Bekapcsolja a bongeszobol elerheto H2 konzolt.
spring.h2.console.enabled=true

# A H2 konzol URL utvonala.
spring.h2.console.path=/h2-console

# A Hibernate automatikusan frissiti az adatbazis semajat az entitasok alapjan.
spring.jpa.hibernate.ddl-auto=update
